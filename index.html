<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ananda Mohan Dutta — Pharmacy Professional</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Lora:ital,wght@0,400;0,500;0,600;1,400;1,500&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy:    #0d1b2a;
    --deep:    #071016;
    --teal:    #1a7a6e;
    --teal-lt: #2ab09d;
    --teal-dim:#0f4f46;
    --aqua:    #5ecfbf;
    --white:   #f4f8f7;
    --mist:    #c8ddd9;
    --smoke:   #7a9e99;
    --surface: #101e28;
    --card:    #122030;
    --border:  rgba(90,200,185,0.15);
    --border-s:rgba(255,255,255,0.06);
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--navy);
    color: var(--white);
    font-family: 'Lora', serif;
    font-weight: 400;
    font-size: 17px;
    line-height: 1.75;
    overflow-x: hidden;
    cursor: none;
  }

  /* Cursor */
  .cursor { position:fixed; width:8px; height:8px; background:var(--aqua); border-radius:50%; pointer-events:none; z-index:9999; transform:translate(-50%,-50%); transition:transform .1s; }
  .cursor-ring { position:fixed; width:34px; height:34px; border:1px solid rgba(94,207,191,0.45); border-radius:50%; pointer-events:none; z-index:9998; transform:translate(-50%,-50%); transition:transform .25s cubic-bezier(.25,.46,.45,.94), width .3s, height .3s; }
  .cursor-ring.hov { width:56px; height:56px; opacity:.4; }

  /* Grain overlay */
  body::after {
    content:'';
    position:fixed; inset:0;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events:none; z-index:999; opacity:.5;
  }

  /* Nav */
  nav {
    position:fixed; top:0; left:0; right:0; z-index:500;
    display:flex; justify-content:space-between; align-items:center;
    padding:24px 64px;
    transition: background .3s, backdrop-filter .3s;
  }
  nav.scrolled { background:rgba(7,16,22,0.96); backdrop-filter:blur(18px); }
  .nav-logo { font-family:'DM Serif Display',serif; font-size:20px; color:var(--white); text-decoration:none; letter-spacing:.02em; }
  .nav-logo span { color:var(--aqua); }
  .nav-links { display:flex; gap:40px; list-style:none; }
  .nav-links a { font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:.18em; text-transform:uppercase; color:var(--smoke); text-decoration:none; transition:color .3s; }
  .nav-links a:hover { color:var(--aqua); }

  /* Hero */
  .hero {
    min-height:100vh;
    display:grid; grid-template-columns:1fr 1fr;
    position:relative; overflow:hidden;
  }
  /* Animated background */
  .hero::before {
    content:'';
    position:absolute; inset:0;
    background: radial-gradient(ellipse at 70% 50%, rgba(26,122,110,0.12) 0%, transparent 65%),
                radial-gradient(ellipse at 20% 80%, rgba(13,27,42,0.8) 0%, transparent 60%);
    z-index:0;
  }

  .hero-left {
    display:flex; flex-direction:column; justify-content:center;
    padding:130px 60px 80px 80px;
    position:relative; z-index:2;
  }
  .hero-badge {
    display:inline-flex; align-items:center; gap:10px;
    border:1px solid var(--border);
    padding:8px 18px;
    font-family:'JetBrains Mono',monospace;
    font-size:10px; letter-spacing:.2em; text-transform:uppercase;
    color:var(--aqua); margin-bottom:36px;
    background:rgba(94,207,191,0.05);
    width:fit-content;
    opacity:0; animation:fadeUp 1s .2s forwards;
  }
  .badge-dot { width:6px; height:6px; background:var(--aqua); border-radius:50%; animation:blink 1.5s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

  .hero-name {
    font-family:'DM Serif Display',serif;
    font-size:clamp(48px,5.5vw,84px);
    font-weight:400; line-height:1.05; letter-spacing:-.01em;
    color:var(--white); margin-bottom:6px;
    opacity:0; animation:fadeUp 1s .4s forwards;
  }
  .hero-name em { font-style:italic; color:var(--aqua); }
  .hero-role {
    font-family:'DM Serif Display',serif;
    font-size:clamp(18px,2vw,26px);
    font-style:italic; color:var(--smoke);
    margin-bottom:40px;
    opacity:0; animation:fadeUp 1s .6s forwards;
  }
  .hero-summary {
    font-size:17px; color:rgba(244,248,247,0.65);
    max-width:500px; line-height:1.85; margin-bottom:52px;
    opacity:0; animation:fadeUp 1s .8s forwards;
  }
  .hero-actions { display:flex; gap:20px; flex-wrap:wrap; opacity:0; animation:fadeUp 1s 1s forwards; }
  .btn-fill {
    background:var(--teal); color:var(--white);
    padding:15px 36px; font-family:'JetBrains Mono',monospace;
    font-size:11px; letter-spacing:.18em; text-transform:uppercase;
    text-decoration:none; transition:all .3s; border:none; cursor:pointer;
  }
  .btn-fill:hover { background:var(--teal-lt); transform:translateY(-2px); }
  .btn-ghost {
    border:1px solid var(--border); color:var(--mist);
    padding:15px 36px; font-family:'JetBrains Mono',monospace;
    font-size:11px; letter-spacing:.18em; text-transform:uppercase;
    text-decoration:none; transition:all .3s;
  }
  .btn-ghost:hover { border-color:var(--aqua); color:var(--aqua); transform:translateY(-2px); }

  .hero-contact-strip {
    display:flex; flex-direction:column; gap:10px; margin-top:44px;
    opacity:0; animation:fadeUp 1s 1.2s forwards;
  }
  .hero-contact-item {
    display:flex; align-items:center; gap:12px;
    font-family:'JetBrains Mono',monospace;
    font-size:11px; letter-spacing:.1em;
    color:var(--smoke);
  }
  .hero-contact-item a { color:var(--aqua); text-decoration:none; }
  .hero-contact-item a:hover { text-decoration:underline; }
  .contact-icon { color:var(--teal-lt); width:16px; text-align:center; }

  .hero-right {
    position:relative; display:flex; align-items:center; justify-content:center;
    overflow:hidden;
    opacity:0; animation:fadeIn 1.2s .6s forwards;
  }
  .hero-visual {
    position:relative; width:380px; height:480px;
  }
  .hero-photo-frame {
    width:100%; height:100%;
    border:1px solid var(--border);
    background:linear-gradient(160deg, #1a3040 0%, #0d1e2a 50%, #091520 100%);
    position:relative; overflow:hidden;
    display:flex; align-items:flex-end; justify-content:center;
  }
  .hero-photo-frame::before {
    content:'';
    position:absolute; inset:0;
    background:radial-gradient(ellipse at 50% 20%, rgba(26,122,110,0.15) 0%, transparent 65%);
  }
  .initials-bg {
    position:absolute; font-family:'DM Serif Display',serif;
    font-size:200px; font-weight:400;
    color:rgba(94,207,191,0.04);
    top:50%; left:50%; transform:translate(-50%,-50%);
    white-space:nowrap; user-select:none; line-height:1;
  }
  .photo-caption {
    position:relative; z-index:2; width:100%;
    border-top:1px solid var(--border);
    padding:20px 28px;
    background:rgba(7,16,22,0.7); backdrop-filter:blur(10px);
  }
  .photo-caption-name { font-family:'DM Serif Display',serif; font-size:18px; color:var(--white); margin-bottom:4px; }
  .photo-caption-role { font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:.15em; color:var(--aqua); text-transform:uppercase; }

  .hero-deco-line {
    position:absolute; right:-20px; top:50%; transform:translateY(-50%);
    width:1px; height:240px;
    background:linear-gradient(to bottom, transparent, var(--teal), transparent);
  }
  .hero-deco-tag {
    position:absolute; top:32px; right:32px;
    font-family:'JetBrains Mono',monospace; font-size:10px;
    letter-spacing:.15em; color:var(--teal-dim); text-transform:uppercase;
    writing-mode:vertical-rl;
  }

  .scroll-hint {
    position:absolute; bottom:40px; left:80px; z-index:10;
    display:flex; align-items:center; gap:14px;
    opacity:0; animation:fadeIn 1s 1.8s forwards;
  }
  .scroll-bar { width:1px; height:50px; background:linear-gradient(to bottom,transparent,var(--teal)); }
  .scroll-txt { font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:.2em; color:var(--teal-dim); text-transform:uppercase; writing-mode:vertical-rl; }

  /* Stats */
  .stats-row {
    background:var(--surface);
    border-top:1px solid var(--border-s); border-bottom:1px solid var(--border-s);
    display:grid; grid-template-columns:repeat(4,1fr);
  }
  .stat-cell {
    padding:44px 36px;
    border-right:1px solid var(--border-s);
    transition:background .3s;
  }
  .stat-cell:last-child { border-right:none; }
  .stat-cell:hover { background:rgba(94,207,191,0.03); }
  .stat-num { font-family:'DM Serif Display',serif; font-size:52px; color:var(--aqua); line-height:1; margin-bottom:8px; }
  .stat-lbl { font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:.2em; text-transform:uppercase; color:var(--smoke); }
  .stat-sub { font-size:13px; color:rgba(122,158,153,0.6); margin-top:4px; }

  /* Sections */
  section { padding:110px 80px; }
  .sec-tag { font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:.25em; text-transform:uppercase; color:var(--aqua); display:flex; align-items:center; gap:14px; margin-bottom:20px; }
  .sec-tag::before { content:''; width:28px; height:1px; background:var(--aqua); }
  .sec-title { font-family:'DM Serif Display',serif; font-size:clamp(32px,4vw,58px); line-height:1.08; color:var(--white); margin-bottom:14px; }
  .sec-title em { font-style:italic; color:var(--aqua); }
  .sec-sub { font-size:18px; color:rgba(244,248,247,0.5); max-width:540px; line-height:1.75; margin-bottom:70px; }

  /* About */
  .about { background:var(--deep); }
  .about-grid { display:grid; grid-template-columns:1.1fr 0.9fr; gap:80px; align-items:start; }
  .about-body p { font-size:17px; color:rgba(244,248,247,0.72); line-height:1.85; margin-bottom:22px; }
  .about-body strong { color:var(--white); font-weight:600; }
  .about-highlight {
    border-left:2px solid var(--teal);
    padding:20px 28px; background:rgba(26,122,110,0.07);
    margin:32px 0;
  }
  .about-highlight p { font-family:'DM Serif Display',serif; font-style:italic; font-size:20px; color:var(--white); line-height:1.55; margin:0; }

  .info-stack { display:flex; flex-direction:column; gap:20px; }
  .info-card {
    background:var(--card); border:1px solid var(--border-s);
    padding:28px; position:relative; overflow:hidden;
    transition:border-color .3s;
  }
  .info-card:hover { border-color:var(--border); }
  .info-card::before { content:''; position:absolute; top:0; left:0; width:2px; height:100%; background:var(--teal); }
  .info-lbl { font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:.2em; text-transform:uppercase; color:var(--teal-dim); margin-bottom:10px; }
  .info-val { font-family:'DM Serif Display',serif; font-size:18px; color:var(--white); }
  .info-note { font-size:13px; color:var(--smoke); margin-top:4px; }

  /* Experience */
  .experience { background:var(--navy); }
  .exp-list { position:relative; padding-left:0; }
  .exp-list::before { content:''; position:absolute; left:0; top:0; bottom:0; width:1px; background:linear-gradient(to bottom, var(--teal), transparent); }

  .exp-card {
    display:grid; grid-template-columns:200px 1fr;
    gap:48px; padding:44px 0 44px 44px;
    border-bottom:1px solid var(--border-s);
    position:relative;
    opacity:0; transform:translateX(-16px);
    transition:opacity .6s, transform .6s cubic-bezier(.25,.46,.45,.94);
  }
  .exp-card.vis { opacity:1; transform:translateX(0); }
  .exp-card::before {
    content:''; position:absolute; left:-4px; top:52px;
    width:9px; height:9px; background:var(--aqua); border-radius:50%;
    box-shadow:0 0 16px rgba(94,207,191,.5);
  }
  .exp-side { padding-top:2px; }
  .exp-period { font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:.12em; color:var(--aqua); margin-bottom:6px; }
  .exp-org { font-size:14px; color:var(--smoke); }
  .exp-title { font-family:'DM Serif Display',serif; font-size:24px; color:var(--white); margin-bottom:14px; line-height:1.25; }
  .exp-bullets { list-style:none; display:flex; flex-direction:column; gap:10px; margin-bottom:22px; }
  .exp-bullets li { font-size:16px; color:rgba(244,248,247,0.65); line-height:1.7; display:flex; gap:12px; align-items:start; }
  .exp-bullets li::before { content:'→'; color:var(--teal-lt); font-size:12px; margin-top:4px; flex-shrink:0; }
  .exp-tags { display:flex; flex-wrap:wrap; gap:8px; }
  .tag { font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:.1em; text-transform:uppercase; color:var(--teal-dim); border:1px solid rgba(26,122,110,0.3); padding:4px 12px; }

  /* Skills */
  .skills-sec { background:var(--surface); }
  .skills-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:2px; }
  .skill-box {
    background:var(--navy); padding:44px 36px;
    opacity:0; transform:translateY(18px);
    transition:opacity .5s, transform .5s;
  }
  .skill-box.vis { opacity:1; transform:translateY(0); }
  .skill-box:hover { background:#0f1d28; }
  .skill-ico { font-size:28px; margin-bottom:18px; display:block; }
  .skill-box-title { font-family:'DM Serif Display',serif; font-size:20px; color:var(--white); margin-bottom:22px; }
  .bar-list { display:flex; flex-direction:column; gap:14px; }
  .bar-item { }
  .bar-meta { display:flex; justify-content:space-between; font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:.1em; color:var(--smoke); margin-bottom:7px; }
  .bar-pct { color:var(--aqua); }
  .bar-track { height:2px; background:rgba(255,255,255,.05); overflow:hidden; }
  .bar-fill { height:100%; background:linear-gradient(to right, var(--teal-dim), var(--aqua)); width:0; transition:width 1.3s cubic-bezier(.25,.46,.45,.94); }

  /* Education */
  .education { background:var(--deep); }
  .edu-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:24px; }
  .edu-card {
    background:var(--card); border:1px solid var(--border-s);
    padding:36px; display:grid; grid-template-columns:52px 1fr; gap:24px;
    opacity:0; transform:translateY(16px); transition:all .6s;
  }
  .edu-card.vis { opacity:1; transform:translateY(0); }
  .edu-icon-box { width:52px; height:52px; background:rgba(26,122,110,.1); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; font-size:22px; flex-shrink:0; }
  .edu-degree { font-family:'DM Serif Display',serif; font-size:18px; color:var(--white); margin-bottom:4px; }
  .edu-grade { font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--aqua); letter-spacing:.1em; }
  .edu-inst { font-size:14px; color:var(--smoke); margin-top:4px; }
  .edu-period { font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--teal-dim); letter-spacing:.1em; margin-top:6px; }
  .edu-note { font-size:13px; color:rgba(122,158,153,.65); margin-top:10px; line-height:1.6; }

  /* Certifications */
  .certs-sec { background:var(--navy); }
  .certs-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:24px; }
  .cert-card {
    background:var(--card); border:1px solid var(--border-s);
    padding:36px; display:flex; gap:20px; align-items:flex-start;
    opacity:0; transform:translateY(16px); transition:all .6s;
  }
  .cert-card.vis { opacity:1; transform:translateY(0); }
  .cert-icon { font-size:28px; flex-shrink:0; margin-top:2px; }
  .cert-name { font-family:'DM Serif Display',serif; font-size:19px; color:var(--white); margin-bottom:6px; line-height:1.3; }
  .cert-org { font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:.15em; color:var(--aqua); text-transform:uppercase; }

  /* Languages */
  .languages { background:var(--surface); }
  .lang-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:24px; }
  .lang-card {
    background:var(--navy); border:1px solid var(--border-s);
    padding:36px; text-align:center;
    opacity:0; transform:translateY(16px); transition:all .5s;
  }
  .lang-card.vis { opacity:1; transform:translateY(0); }
  .lang-name { font-family:'DM Serif Display',serif; font-size:26px; color:var(--white); margin-bottom:8px; }
  .lang-level { font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:.2em; text-transform:uppercase; color:var(--aqua); }
  .lang-dots { display:flex; justify-content:center; gap:6px; margin-top:16px; }
  .lang-dot { width:8px; height:8px; border-radius:50%; background:rgba(94,207,191,.2); }
  .lang-dot.filled { background:var(--aqua); }

  /* Contact */
  .contact { background:var(--deep); }
  .contact-grid { display:grid; grid-template-columns:1fr 1fr; gap:80px; align-items:center; }
  .contact-cards { display:flex; flex-direction:column; gap:18px; margin-top:40px; }
  .contact-card {
    display:flex; align-items:center; gap:18px;
    background:var(--card); border:1px solid var(--border-s);
    padding:20px 24px; text-decoration:none; transition:all .3s;
  }
  .contact-card:hover { border-color:var(--border); background:rgba(94,207,191,.04); }
  .cc-icon { width:40px; height:40px; background:rgba(26,122,110,.15); display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0; }
  .cc-lbl { font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:.15em; color:var(--teal-dim); text-transform:uppercase; margin-bottom:3px; }
  .cc-val { font-size:15px; color:var(--white); }

  .contact-form { display:flex; flex-direction:column; gap:20px; }
  .fg { display:flex; flex-direction:column; gap:8px; }
  .fl { font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:.18em; text-transform:uppercase; color:var(--smoke); }
  .fi, .fta { background:var(--card); border:1px solid var(--border-s); color:var(--white); padding:14px 18px; font-family:'Lora',serif; font-size:16px; outline:none; transition:border-color .3s; resize:none; }
  .fi:focus, .fta:focus { border-color:var(--teal); }
  .fi::placeholder, .fta::placeholder { color:rgba(122,158,153,.35); }
  .fta { height:120px; }
  .fsub { background:transparent; border:1px solid var(--teal); color:var(--aqua); padding:16px 44px; font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:.18em; text-transform:uppercase; cursor:pointer; transition:all .3s; align-self:flex-start; }
  .fsub:hover { background:var(--teal); color:var(--white); }

  /* Footer */
  footer { background:var(--deep); border-top:1px solid var(--border-s); padding:44px 80px; display:flex; justify-content:space-between; align-items:center; }
  .foot-logo { font-family:'DM Serif Display',serif; font-size:18px; color:var(--white); }
  .foot-logo span { color:var(--aqua); }
  .foot-copy { font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:.12em; color:var(--smoke); }
  .foot-links { display:flex; gap:28px; }
  .foot-link { font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:.1em; text-transform:uppercase; color:var(--smoke); text-decoration:none; transition:color .3s; }
  .foot-link:hover { color:var(--aqua); }

  /* Animations */
  @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }

  /* Responsive */
  @media(max-width:1100px){
    .hero{grid-template-columns:1fr;}
    .hero-right{display:none;}
    .about-grid{grid-template-columns:1fr;gap:50px;}
    .skills-grid{grid-template-columns:repeat(2,1fr);}
    .certs-grid,.edu-grid,.lang-grid{grid-template-columns:1fr;}
    .contact-grid{grid-template-columns:1fr;}
    section{padding:80px 36px;}
    nav{padding:20px 36px;}
    .scroll-hint{left:36px;}
    .hero-left{padding:120px 36px 80px;}
    footer{flex-direction:column;gap:20px;text-align:center;padding:40px 36px;}
